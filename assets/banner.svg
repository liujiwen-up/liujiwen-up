<svg width="1200" height="360" viewBox="0 0 1200 360" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Liu Jiwen GitHub Profile Banner</title>
  <desc id="desc">A blue and purple gradient banner for a big data engineer focused on Apache Doris, SelectDB, query engines, and developer tools.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="360" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0f172a"/>
      <stop offset="0.45" stop-color="#1e3a8a"/>
      <stop offset="1" stop-color="#6d28d9"/>
    </linearGradient>
    <radialGradient id="glow1" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(945 75) rotate(135) scale(380 260)">
      <stop stop-color="#38bdf8" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#38bdf8" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(160 335) rotate(-35) scale(420 260)">
      <stop stop-color="#a78bfa" stop-opacity="0.45"/>
      <stop offset="1" stop-color="#a78bfa" stop-opacity="0"/>
    </radialGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#020617" flood-opacity="0.35"/>
    </filter>
  </defs>

  <rect width="1200" height="360" rx="32" fill="url(#bg)"/>
  <rect width="1200" height="360" rx="32" fill="url(#glow1)"/>
  <rect width="1200" height="360" rx="32" fill="url(#glow2)"/>

  <g opacity="0.18" stroke="#e0f2fe" stroke-width="1">
    <path d="M86 78H1114"/>
    <path d="M86 142H1114"/>
    <path d="M86 206H1114"/>
    <path d="M86 270H1114"/>
    <path d="M160 38V322"/>
    <path d="M320 38V322"/>
    <path d="M480 38V322"/>
    <path d="M640 38V322"/>
    <path d="M800 38V322"/>
    <path d="M960 38V322"/>
  </g>

  <g filter="url(#shadow)">
    <rect x="760" y="78" width="310" height="206" rx="24" fill="#020617" fill-opacity="0.42" stroke="#93c5fd" stroke-opacity="0.28"/>
    <circle cx="808" cy="128" r="10" fill="#22c55e"/>
    <circle cx="842" cy="128" r="10" fill="#f59e0b"/>
    <circle cx="876" cy="128" r="10" fill="#ef4444"/>
    <path d="M808 176H1018" stroke="#bfdbfe" stroke-width="10" stroke-linecap="round" opacity="0.82"/>
    <path d="M808 216H960" stroke="#67e8f9" stroke-width="10" stroke-linecap="round" opacity="0.76"/>
    <path d="M808 256H1000" stroke="#c4b5fd" stroke-width="10" stroke-linecap="round" opacity="0.76"/>
  </g>

  <text x="86" y="126" fill="#e0f2fe" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="30" font-weight="700" letter-spacing="0.08em">HELLO, I'M</text>
  <text x="86" y="190" fill="#ffffff" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="64" font-weight="800">Liu Jiwen</text>
  <text x="90" y="238" fill="#bfdbfe" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="28" font-weight="600">Big Data · Apache Doris / SelectDB · Query Engines</text>

  <g font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="20" font-weight="700">
    <rect x="90" y="276" width="104" height="42" rx="21" fill="#0ea5e9" fill-opacity="0.28" stroke="#7dd3fc" stroke-opacity="0.6"/>
    <text x="122" y="304" fill="#e0f2fe">Java</text>
    <rect x="210" y="276" width="104" height="42" rx="21" fill="#f97316" fill-opacity="0.24" stroke="#fdba74" stroke-opacity="0.55"/>
    <text x="242" y="304" fill="#ffedd5">Rust</text>
    <rect x="330" y="276" width="124" height="42" rx="21" fill="#22c55e" fill-opacity="0.22" stroke="#86efac" stroke-opacity="0.55"/>
    <text x="360" y="304" fill="#dcfce7">Python</text>
    <rect x="470" y="276" width="154" height="42" rx="21" fill="#8b5cf6" fill-opacity="0.24" stroke="#c4b5fd" stroke-opacity="0.55"/>
    <text x="500" y="304" fill="#ede9fe">Data Systems</text>
  </g>
</svg>
